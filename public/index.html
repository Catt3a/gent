<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Share Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 16px;
    }

    #status {
      margin-bottom: 12px;
      color: #444;
    }

    img {
      width: 100%;
      border: 1px solid #ccc;
      background: #111;
      min-height: 240px;
    }
  </style>
</head>
<body>
  <h1>Экран клиента</h1>
  <div id="status">Подключение...</div>
  <img id="screen" alt="Экран" />

  <script>
    const statusEl = document.getElementById("status");
    const screenImg = document.getElementById("screen");

    let frames = 0;
    let lastFpsAt = Date.now();
    let objectUrl = null;

    const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?role=viewer`;
    const ws = new WebSocket(wsUrl);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      statusEl.textContent = "Ожидание трансляции...";
    };

    ws.onmessage = (event) => {
      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
      }

      const blob = new Blob([event.data], { type: "image/jpeg" });
      objectUrl = URL.createObjectURL(blob);
      screenImg.src = objectUrl;

      frames += 1;
      const now = Date.now();
      if (now - lastFpsAt >= 1000) {
        const fps = (frames / ((now - lastFpsAt) / 1000)).toFixed(1);
        statusEl.textContent = `FPS: ${fps}`;
        frames = 0;
        lastFpsAt = now;
      }
    };

    ws.onclose = () => {
      statusEl.textContent = "Соединение закрыто";
    };

    ws.onerror = () => {
      statusEl.textContent = "Ошибка WebSocket";
    };
  </script>
</body>
</html>
