<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Share Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 1200px;
      margin: 24px auto;
      padding: 3px 15px;
      background-color: black;
      background: #111;
    }

    #status {
      margin-bottom: 0px;
      padding: px 0px;
      color: green;
    }
    
    #empty = {
        
    }
    
    img {
      width: 100%;
      background: #111;
      min-height: 240px;
      padding: 0px 0px;
    }
  </style>
</head>
<body>
    
  <img id="screen" alt="Экран" />
  <div id="empty">ㅤ</div>
  <div id="status">Нет сигнала</div>
  
  <script>
    const statusEl = document.getElementById("status");
    const screenImg = document.getElementById("screen");

    let frames = 0;
    let lastFpsAt = Date.now();
    let objectUrl = null;

    const wsUrl = `${location.protocol === "https:" ? "wss" : "ws"}://${location.host}/ws?role=viewer`;
    const ws = new WebSocket(wsUrl);
    ws.binaryType = "arraybuffer";

    ws.onopen = () => {
      statusEl.textContent = "Подключение...";
    };

    ws.onmessage = (event) => {
      if (objectUrl) {
        URL.revokeObjectURL(objectUrl);
      }

      const blob = new Blob([event.data], { type: "image/jpeg" });
      objectUrl = URL.createObjectURL(blob);
      screenImg.src = objectUrl;

      frames += 1;
      const now = Date.now();
      if (now - lastFpsAt >= 1000) {
        const fps = (frames / ((now - lastFpsAt) / 1000)).toFixed(1);
        statusEl.textContent = `FPS: ${fps}`;
        frames = 0;
        lastFpsAt = now;
      }
    };

    ws.onclose = () => {
      statusEl.textContent = "Нет сигнала";
    };

    ws.onerror = (err) => {
      statusEl.textContent = err;
    };
  </script>
</body>
</html>
